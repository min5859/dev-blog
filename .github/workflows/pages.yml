name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      # release status 카드(홈 상단)는 data/normalized/linux/source-records-latest.json
      # 에 의존한다. 이 파일은 gitignore 라 빌드 환경에 없으므로 빌드 직전에 한 번
      # 가볍게 collect 만 돌려 채운다. kernel.org / lore 가 일시적으로 503 이어도
      # 빌드 자체는 막지 않도록 실패는 무시한다 (loadReleaseStatus 는 null 을 받으면
      # 섹션을 통째로 빈 문자열로 렌더한다).
      - name: Refresh release status snapshot
        run: npm run collect:linux || echo "collect:linux failed; release status will be empty"

      - name: Build static site
        env:
          SITE_URL: ${{ steps.pages.outputs.base_url }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
